name: build and scan with Veracode

on:
  push:
    branches:
      - feature/*
      - develop
      - main

  pull_request:
    branches:
      - develop
      - main

jobs:
    Build:
        runs-on: ubuntu-latest
        steps:
            - name: Checking Out Code Repo
              uses: actions/checkout@v2

            # Clean output directory
            - name: Clean Output Directory
              working-directory: ./app
              run: mvn -B clean

            #Setting Java
            - name: Set up JDK 8
              uses: actions/setup-java@v2
              with:
                java-version: '8'
                distribution: 'temurin'

            - name: Build with Maven
              working-directory: ./app
              run: mvn -B package --file pom.xml

            # Publishing artifacts - Binaries to be scanned
            - name: Step 3 - Use the Upload Artifact GitHub Action
              uses: actions/upload-artifact@v4
              with: 
                name: veracode-artifact
                path: ./app/target/verademo.war

    build-docker-image:
      needs: Build
      runs-on: ubuntu-latest
      if: |
         github.ref_name == 'develop'
      permissions:
        contents: read
        packages: write

      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Login to GHCR
          run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

        - name: Build Docker image
          run: |
            docker build -t ghcr.io/${{ github.repository }}/${{ github.sha }} .

        - name: Push Docker image
          run: |
            docker push ghcr.io/${{ github.repository }}/${{ github.sha }}

        - name: List images
          run: docker images


    veracode-pipeline-scan:
      needs: Build
      if: startsWith(github.ref_name, 'feature/')
      uses: ./.github/workflows/veracode_pipeline_scan.yml
      secrets: inherit
      permissions:
        contents: read
        actions: read
        issues: write
        security-events: write
      with:
        veracode_policy_name: 'Veracode Recommended Very High + SCA'
        json_output: true
        output_file: veracode-results.json
        fail_build: false
        verbose: true

    veracode-sca-scan:
      needs: Build
      if: startsWith(github.ref_name, 'feature/')
      uses: ./.github/workflows/veracode_sca_scan.yml
      secrets: inherit
      permissions:
        contents: read
        issues: write
        pull-requests: write
        security-events: write
      with:
        quick: true
        path: './app'

    veracode-iac-scan:
      needs: Build
      if: startsWith(github.ref_name, 'feature/')
      uses: ./.github/workflows/veracode_iac_container_scan.yml
      secrets: inherit
      with:
        scan_type: directory
        scan_source: .
        format_result: json

    veracode-iac-scan_image:
      needs: build-docker-image
      if: |
         github.ref_name == 'develop'
      uses: ./.github/workflows/veracode_iac_container_scan.yml
      secrets: inherit
      with:
        scan_type: image
        scan_source: ghcr.io/${{ github.repository }}/verademo-net:${{ github.sha }}
        format_result: json

    veracode-sandbox:
      needs: Build
      if: |
        github.ref_name == 'develop'
      uses: ./.github/workflows/veracode_sandbox_scan.yml
      secrets: inherit
      permissions:
        contents: read
        actions: read
        issues: write
        security-events: write
      with:
        veracode_app_profile_name: ${{ github.event.repository.name }}
        veracode_sandbox_name: 'feature-develop-sandbox'
        create_profile: true
        create_sandbox: true

    veracode-policy-scan:
      needs: Build
      if: |
        github.ref_name == 'main'
      uses: ./.github/workflows/veracode_policy_scan.yml
      secrets: inherit
      permissions:
        contents: read
        actions: read
        issues: write
        security-events: write
      with:
        veracode_app_profile_name: ${{ github.event.repository.name }}