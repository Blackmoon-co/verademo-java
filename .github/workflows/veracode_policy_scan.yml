name: Veracode policy scan

on:
  workflow_call:
    inputs:
      veracode_app_profile_name:
        required: true
        type: string

jobs:
  policy-scan:
    runs-on: ubuntu-latest
    steps:

      - name: Downloading artifact
        uses: actions/download-artifact@v4
        with:
          name: veracode-artifact

      - name: Detect artifact for Veracode
        id: detect
        run: |
          artifact=$(find . -type f \( -name "*.zip" -o -name "*.war" -o -name "*.jar" -o -name "*.ear" \) | head -n 1)

          if [ -z "$artifact" ]; then
            echo "::error::No valid artifact found"
            exit 1
          fi

          echo "Artifact detected: $artifact"
          echo "artifact_path=$artifact" >> $GITHUB_OUTPUT

      - name: Policy Scan en Veracode
        uses: veracode/veracode-uploadandscan-action@0.2.11
        with:
          appname:  ${{ inputs.VERACODE_APP_PROFILE_NAME }}
          createprofile: true
          vid: ${{ secrets.VERACODE_API_ID }}
          vkey: ${{ secrets.VERACODE_API_KEY}}
          filepath: ${{ steps.detect.outputs.artifact_path }}
          version: '${{ github.run_id }}'
          deleteincompletescan: 2
          scantimeout: 1200