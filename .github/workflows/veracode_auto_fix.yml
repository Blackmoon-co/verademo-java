name: Veracode Static Scan + Auto-Fix PR

on:
  workflow_dispatch: # trigger manual desde GitHub UI
  push:
    branches:
      - main
      - master
      - develop
      - "feature/**"

permissions:
  contents: write # para hacer commit de los fixes
  pull-requests: write # para crear el PR

jobs:
  veracode-scan-fix:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # historial completo para que el PR tenga contexto

      # ── 2. Java + Maven ────────────────────────────────────────────────────
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: "8"
          distribution: "temurin"
          cache: maven

      # ── 3. Compilar WAR ────────────────────────────────────────────────────
      - name: Build WAR
        run: mvn -f app/pom.xml clean package -DskipTests -q

      # ── 4. Instalar Veracode CLI ───────────────────────────────────────────
      - name: Install Veracode CLI
        run: |
          curl -fsS https://tools.veracode.com/veracode-cli/install | sh
          echo "$HOME/.veracode/bin" >> "$GITHUB_PATH"

      # ── 5. Configurar credenciales Veracode ───────────────────────────────
      - name: Configure Veracode credentials
        env:
          API_ID: ${{ secrets.VERACODE_API_ID }}
          API_KEY: ${{ secrets.VERACODE_API_KEY }}
        run: |
          mkdir -p ~/.veracode
          printf 'credentials:\n  default:\n    api_key_id: "%s"\n    api_key_secret: "%s"\n' \
            "${API_ID}" "${API_KEY}" > ~/.veracode/credentials
          echo "Credentials file written."

      # ── 6. Static scan (SAST) ──────────────────────────────────────────────
      - name: Run Veracode Static Scan
        id: static_scan
        # exit code 1 = findings found; sigue el pipeline de todos modos
        continue-on-error: true
        run: |
          veracode static scan app/target/verademo.war \
            --results-file pipeline-results.json
          echo "Scan exit code: $?"
          ls -la pipeline-results.json 2>/dev/null || echo "WARNING: pipeline-results.json not created"
      # ── 7. Verificar que hay resultados ────────────────────────────────────
      - name: Check scan results exist
        run: |
          if [ ! -f pipeline-results.json ]; then
            echo "pipeline-results.json not found."
            echo "Check that VERACODE_API_ID and VERACODE_API_KEY secrets are configured in the repo."
            echo "Go to: Settings -> Secrets and variables -> Actions"
            exit 1
          fi
          echo "Scan results found. Size: $(wc -c < pipeline-results.json) bytes"
          JAVA_ISSUES=$(python3 - <<'EOF'
          import json, sys
          with open("pipeline-results.json") as f:
              data = json.load(f)
          count = sum(
              1 for finding in data.get("findings", [])
              if finding.get("files", {}).get("source_file", {}).get("file", "").endswith(".java")
          )
          print(count)
          EOF
          )
          echo "Java issues found: $JAVA_ISSUES"
          if [ "$JAVA_ISSUES" -eq "0" ]; then
            echo "No Java issues to fix. Workflow complete."
            exit 0
          fi

      # ── 8. Instalar pexpect (para automatizar CLI interactivo) ─────────────
      - name: Install Python pexpect
        run: pip install pexpect --quiet

      # ── 9. Ejecutar auto-fix ───────────────────────────────────────────────
      - name: Run Veracode Auto-Fix
        env:
          VERACODE_RESULTS_FILE: pipeline-results.json
          GITHUB_WORKSPACE: ${{ github.workspace }}
          VERACODE_CLI: veracode
        run: python3 scripts/veracode_auto_fix.py

      # ── 10. Crear PR con los fixes ─────────────────────────────────────────
      - name: Create Pull Request with fixes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="veracode/auto-fix-${{ github.run_number }}"
          BASE="${{ github.ref_name }}"

          # Verificar si hay cambios para commitear
          if git diff --quiet && git diff --staged --quiet; then
            echo "No file changes detected after auto-fix. Skipping PR creation."
            exit 0
          fi

          git checkout -b "$BRANCH"
          git add app/src/main/java/
          git commit -m "fix(security): Apply Veracode auto-fix recommendations

          Fixes applied automatically via 'veracode fix' (legacy mode).
          Workflow run: ${{ github.run_number }}"

          git push origin "$BRANCH"

          gh pr create \
            --base "$BASE" \
            --head "$BRANCH" \
            --title "Veracode Auto-Fix: Security issues resolved (run #${{ github.run_number }})" \
            --body "## Veracode Security Auto-Fix

          This PR was automatically generated by the **Veracode Static Scan + Auto-Fix** workflow.

          ### What happened
          1. The project was compiled and scanned with \`veracode static scan\`.
          2. All findings in Java source files were passed through \`veracode fix\`.
          3. Fix option **1** was selected for every issue that had an available fix.

          ### Review checklist
          - [ ] Verify each fix makes sense in context
          - [ ] Run unit tests locally before merging
          - [ ] Re-scan after merge to confirm findings are resolved

          > **Note:** Some issues may not have had an automatic fix available and were skipped."

      # ── 11. Subir pipeline-results.json como artefacto ────────────────────
      - name: Upload scan results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: veracode-scan-results-${{ github.run_number }}
          path: |
            pipeline-results.json
            filtered-results.json
          retention-days: 30
