name: Veracode pipeline scan with jar veracode

permissions:
  contents: read
  security-events: write
  actions: read
  issues: write

on:
  workflow_call:
    inputs:
      veracode_policy_name:
        required: true
        type: string
      json_output:
        required: false
        type: boolean
        default: true
      output_file:
        required: false
        type: string
        default: veracode-results.json
      fail_build:
        required: false
        type: boolean
        default: false
      verbose:
        required: false
        type: boolean
        default: true

jobs:
  pipeline-scan-jar:
    runs-on: ubuntu-latest
    steps:
      - name: Downloading artifact
        uses: actions/download-artifact@v4
        with:
          name: veracode-artifact

      - name: Detect artifact for Veracode
        id: detect
        run: |
          artifact=$(find . -type f \( -name "*.zip" -o -name "*.war" -o -name "*.jar" -o -name "*.ear" \) | head -n 1)

          if [ -z "$artifact" ]; then
            echo "::error::No valid artifact found"
            exit 1
          fi

          echo "Artifact detected: $artifact"
          echo "artifact_path=$artifact" >> $GITHUB_OUTPUT

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: "11"
          distribution: "temurin"

      - name: Download the Pipeline Scanner
        run: curl -O https://downloads.veracode.com/securityscan/pipeline-scan-LATEST.zip

      - name: Unzip the Pipeline Scanner
        run: unzip -o pipeline-scan-LATEST.zip

      - name: Download policy file from Veracode
        id: download_policy
        run: |
          # Sanitizar el nombre para evitar espacios
          POLICY_NAME="${{ inputs.veracode_policy_name }}"
          SAFE_NAME=$(echo "$POLICY_NAME" | sed 's/ /_/g')
          POLICY_FILE="./${SAFE_NAME}.json"

          echo "Downloading policy: $POLICY_NAME"
          echo "Will save to: $POLICY_FILE"

          java -Dpipeline.debug=${{ inputs.verbose }} -jar pipeline-scan.jar \
            --veracode_api_id "${{ secrets.VERACODE_API_ID }}" \
            --veracode_api_key "${{ secrets.VERACODE_API_KEY }}" \
            -rp "$POLICY_NAME" \
            -pn "$POLICY_FILE"

          # Verificar si el archivo se creó y no está vacío
          if [ -f "$POLICY_FILE" ] && [ -s "$POLICY_FILE" ]; then
            echo "Policy file downloaded successfully"
            echo "policy_file=$POLICY_FILE" >> $GITHUB_OUTPUT

            # Mostrar primeras líneas para debug
            echo "Policy file content preview:"
            head -c 500 "$POLICY_FILE"
          else
            echo "::error::Failed to download policy file or file is empty"
            echo "Listing current directory:"
            ls -la
            exit 1
          fi

      - name: Run Pipeline Scanner
        id: scan
        run: |
          echo "Scanning file: ${{ steps.detect.outputs.artifact_path }}"
          echo "Using policy: ${{ steps.download_policy.outputs.policy_file }}"

          java -Dpipeline.debug=${{ inputs.verbose }} -jar pipeline-scan.jar \
            --veracode_api_id "${{ secrets.VERACODE_API_ID }}" \
            --veracode_api_key "${{ secrets.VERACODE_API_KEY }}" \
            --file "${{ steps.detect.outputs.artifact_path }}" \
            --json_output ${{ inputs.json_output }} \
            --json_output_file "${{ inputs.output_file }}" \
            -pf "${{ steps.download_policy.outputs.policy_file }}"

      - name: Upload Veracode results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: veracode-pipeline-scan-results
          path: ${{ inputs.output_file }}
          if-no-files-found: warn
