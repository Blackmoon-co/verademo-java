name: Veracode pipeline scan with jar veracode

permissions:
  contents: read
  security-events: write
  actions: read
  issues: write

on:
  workflow_call:
    inputs:
      veracode_policy_name:
        required: true
        type: string
      json_output:
        required: false
        type: boolean
        default: true
      output_file:
        required: false
        type: string
        default: veracode-results.json
      fail_build:
        required: false
        type: boolean
        default: false
      verbose:
        required: false
        type: boolean
        default: true

jobs:
  pipeline-scan-jar:
    runs-on: ubuntu-latest
    steps:
      - name: Downloading artifact
        uses: actions/download-artifact@v4
        with:
          name: veracode-artifact

      - name: Detect artifact for Veracode
        id: detect
        run: |
          artifact=$(find . -type f \( -name "*.zip" -o -name "*.war" -o -name "*.jar" -o -name "*.ear" \) | head -n 1)

          if [ -z "$artifact" ]; then
            echo "::error::No valid artifact found"
            exit 1
          fi

          echo "Artifact detected: $artifact"
          echo "artifact_path=$artifact" >> $GITHUB_OUTPUT

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Download the Pipeline Scanner
        run: curl -O https://downloads.veracode.com/securityscan/pipeline-scan-LATEST.zip

      - name: Unzip the Pipeline Scanner
        run: unzip -o pipeline-scan-LATEST.zip

      - name: Run Pipeline Scanner
        id: scan
        continue-on-error: true  # 👈 Permite que el paso no detenga el flujo inmediatamente
        run: |
          java -Dpipeline.debug=${{ inputs.verbose }} -jar pipeline-scan.jar \
            --veracode_api_id "${{ secrets.VERACODE_API_ID }}" \
            --veracode_api_key "${{ secrets.VERACODE_API_KEY }}" \
            --file "${{ steps.detect.outputs.artifact_path }}" \
            --json_output ${{ inputs.json_output }} \
            --json_output_file "${{ inputs.output_file }}" \
            --fail_on_severity="Very High,High"
          
          # Guardamos el código de salida
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Upload Veracode results
        if: always() 
        uses: actions/upload-artifact@v4
        with:
          name: veracode-pipeline-scan-results
          path: ${{ inputs.output_file }}
          if-no-files-found: warn

      - name: Fail build if vulnerabilities found
        if: steps.scan.outputs.exit_code != 0 && inputs.fail_build == true
        run: |
          echo "::error::Veracode Pipeline Scan failed - Found Very High or High severity vulnerabilities"
          echo "Results uploaded to artifact: veracode-pipeline-scan-results"
          exit 1