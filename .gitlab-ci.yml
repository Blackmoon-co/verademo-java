stages:
  - build
  - security

include:
  - project: 'devsecops7293510/gitlab-templates'
    ref: 'main'
    file: '/veracode/pipeline.yml'

variables:
  VERACODE_APP_NAME: "mi-app"
  PACKAGE_PATH: "app/target/*.war"
  PROJECT_PATH: "app"

############################
# BUILD
############################

build_app:
  image: maven:3.6.3-openjdk-8
  stage: build
  script:
    - mvn -f app clean package
  artifacts:
    paths:
      - app/target/verademo.war

