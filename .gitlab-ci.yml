stages:
    - build
    - static-scan

build_app:
    image: maven:3.6.3-openjdk-8
    stage: build
    script: 
        - mvn -f app clean package
    artifacts:
        paths:
            - app/target/verademo.war

veracode_static_scan:
    image: veracode/api-wrapper-java:latest
    stage: static-scan
    script:
        - java -jar /opt/veracode/api-wrapper.jar 
            -vid "${VERACODE_API_KEY_ID}" 
            -vkey "${VERACODE_API_KEY_SECRET}" 
            -action UploadAndScan 
            -appname "VeraDemoJava" 
            -createprofile true 
            -filepath app/target/verademo.war 
            -version "Commit ${CI_COMMIT_SHA:0:8} - Job $CI_JOB_ID"
    allow_failure: true